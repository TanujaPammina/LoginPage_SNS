<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #2c5364);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 350px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
            color: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-size: 14px;
            display: block;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: none;
            outline: none;
        }

       .options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    margin-top: 10px;
}

.remember {
    display: flex;
    align-items: center;
    gap: 5px;
}

.remember input {
    margin: 0;
}

        .options a {
            color: #00c6ff;
            text-decoration: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: black;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #333;
        }

        .register {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }

        .register a {
            color: #00c6ff;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Login In</h2>

    <form action="LoginServlet" method="post">
        
        <label>Your username</label>
        <input type="text" name="username" placeholder="Enter Username" required>

        <label>Your password</label>
        <input type="password" name="password" placeholder="Enter Password" required>

        <div class="options">
            <div class="remember">
            <input type="checkbox" id="remember">
            <label for="remember">Remember me</label>
        </div>
            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit">Login</button>
        
    </form>

    <div class="register">
        Not a member? <a href="#">Register here!</a>
    </div>
</div>

</body>
</html>
