<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #0f2027, #2c5364);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 350px;
            padding: 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            color: white;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00c6ff;
            color: black;
            border: none;
            border-radius: 6px;
        }

        .login {
            text-align: center;
            margin-top: 10px;
        }

        .login a {
            color: #00c6ff;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Sign Up</h2>

    <form action="SignupServlet" method="post">
        <input type="text" name="username" placeholder="Create Username" required>
        <input type="password" name="password" placeholder="Create Password" required>
        <button type="submit">Sign Up</button>
    </form>

    <div class="login">
        Already have account? <a href="login.html">Login</a>
    </div>
</div>

</body>
</html>
